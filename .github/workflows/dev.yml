name: dev

# Continuous-integration workflow that runs on every push to `dev` and on
# pull requests. Compiles the `CrabPort` binary for all six platform × arch
# combinations and uploads each artifact to the workflow run so it can be
# downloaded for smoke testing without cutting a release.
#
# Packaging strategy — every platform uses `cargo bundle`:
#   - macOS  → `--format dmg`       → `.dmg` disk image
#   - Linux   → `--format appimage` → `.AppImage`
#   - Windows → `--format msi`      → `.msi` installer
#
# Bundling (vs. shipping raw binaries) gives users a self-contained
# installable package on every platform. On Linux in particular this
# matters: an AppImage bundles the X11/Wayland/Vulkan/font/etc. runtime
# libs so users don't have to install ~15 -dev packages by hand.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the toolchain so CI failures don't silently come from a rolling
  # rustup. Bump deliberately when upgrading the project's MSRV.
  RUST_TOOLCHAIN: 1.91.1

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Intel runner for x86_64, Apple Silicon for aarch64.
          # `dmg` format uses hdiutil (macOS built-in, no extra setup).
          - os: macos
            arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-13
            bundle_format: dmg
            artifact_ext: dmg
          - os: macos
            arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-14
            bundle_format: dmg
            artifact_ext: dmg
          # Linux — x64 runs on a standard Ubuntu runner; aarch64 runs on
          # GitHub's native ARM Ubuntu runner so we avoid cross-compiling
          # gpui's native (X11/Wayland/Vulkan/font) dependencies.
          # `appimage` format needs `squashfs-tools` (mksquashfs).
          - os: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            bundle_format: appimage
            artifact_ext: AppImage
          - os: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            bundle_format: appimage
            artifact_ext: AppImage
          # Windows — both arches run on the windows runner; aarch64
          # cross-compiles via the MSVC arm64 toolchain (shipped with the
          # image, no extra setup needed beyond the rust target).
          # `msi` format is generated in pure Rust (no WiX/dotnet needed).
          - os: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
            runner: windows-2022
            bundle_format: msi
            artifact_ext: msi
          - os: windows
            arch: aarch64
            target: aarch64-pc-windows-msvc
            runner: windows-2022
            bundle_format: msi
            artifact_ext: msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          # Enable universe (libxcb-cursor-dev lives there) — GitHub's
          # ubuntu runners enable it by default, but be explicit so a future
          # image change can't silently break us.
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          # gpui on Linux links against X11 / Wayland / Vulkan / fontconfig
          # / freetype / alsa / pulseaudio / dbus / openssl at build time.
          # `squashfs-tools` provides `mksquashfs`, required by
          # `cargo bundle --format appimage`.
          sudo apt-get install -y \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-cursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev \
            libfontconfig1-dev libfreetype6-dev \
            libasound2-dev libpulse-dev libdbus-1-dev \
            libssl-dev pkg-config \
            squashfs-tools

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      # ---- Build --------------------------------------------------------

      - name: Build bundle (non-Windows)
        if: runner.os != 'Windows'
        run: cargo bundle --release --target ${{ matrix.target }} --format ${{ matrix.bundle_format }}

      - name: Build bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo bundle --release --target ${{ matrix.target }} --format ${{ matrix.bundle_format }}

      # ---- Stage artifacts to a predictable path ------------------------
      # The bundle lands under target/<triple>/release/bundle/<format>/.
      # We locate the produced artifact and copy it to a predictable name
      # so the upload step has a single path to reference.

      - name: Stage artifact (non-Windows)
        if: runner.os != 'Windows'
        run: |
          set -e
          bundle_dir="target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_format }}"
          ref="${GITHUB_REF_NAME//\//-}"
          sha="${GITHUB_SHA::7}"
          name="CrabPort-${ref}-${sha}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.artifact_ext }}"
          artifact_path="$(find "$bundle_dir" -maxdepth 2 -type f -name '*.${{ matrix.artifact_ext }}' | head -n1)"
          cp "$artifact_path" "$RUNNER_TEMP/$name"
          echo "artifact=$RUNNER_TEMP/$name" >> $GITHUB_ENV

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleDir = "target\${{ matrix.target }}\release\bundle\${{ matrix.bundle_format }}"
          $artifact = Get-ChildItem -Path $bundleDir -Recurse -File -Filter *.${{ matrix.artifact_ext }} | Select-Object -First 1
          $ref = "${{ github.ref_name }}" -replace '/', '-'
          $sha = "${{ github.sha }}".Substring(0, 7)
          $name = "CrabPort-$ref-$sha-windows-${{ matrix.arch }}.${{ matrix.artifact_ext }}"
          Copy-Item $artifact.FullName "$env:RUNNER_TEMP\$name"
          "artifact=$env:RUNNER_TEMP\$name" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrabPort-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.artifact }}
          if-no-files-found: error
          retention-days: 14
